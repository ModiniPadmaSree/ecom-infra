---
# ── CLEANUP ───────────────────────────────────────────────
- name: Remove old Jenkins keys and repos
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/keyrings/jenkins-keyring.asc
    - /usr/share/keyrings/jenkins-keyring.asc
    - /usr/share/keyrings/jenkins-keyring.gpg
    - /etc/apt/sources.list.d/jenkins.list

# ── JAVA ──────────────────────────────────────────────────
- name: Install Java 17
  apt:
    name: openjdk-17-jdk
    state: present
    update_cache: yes

# ── JENKINS ───────────────────────────────────────────────
- name: Install wget
  apt:
    name: wget
    state: present

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Jenkins 2026 key
  shell: >
    wget -O /etc/apt/keyrings/jenkins-keyring.asc
    https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
  args:
    creates: /etc/apt/keyrings/jenkins-keyring.asc

- name: Add Jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/\n"
    mode: '0644'

- name: Update apt after Jenkins repo
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Start and enable Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

- name: Add jenkins to docker group
  user:
    name: jenkins
    groups: docker
    append: yes
  notify: restart jenkins

- name: Add jenkins to sudoers
  lineinfile:
    path: /etc/sudoers
    line: "jenkins ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s

- name: Wait for Jenkins to start
  wait_for:
    port: "{{ jenkins_port }}"
    delay: 10
    timeout: 160

- name: Get Jenkins initial admin password
  command: cat {{ jenkins_home }}/secrets/initialAdminPassword
  register: jenkins_password
  changed_when: false

- name: Print Jenkins initial password
  debug:
    msg: "Jenkins initial password: {{ jenkins_password.stdout }}"

# ── TRIVY ─────────────────────────────────────────────────
- name: Remove old Trivy keys
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/trivy-keyring.gpg
    - /usr/share/keyrings/trivy-keyring.asc
    - /etc/apt/sources.list.d/trivy.list

- name: Download Trivy key
  shell: >
    wget -O /usr/share/keyrings/trivy-keyring.asc
    https://aquasecurity.github.io/trivy-repo/deb/public.key
  args:
    creates: /usr/share/keyrings/trivy-keyring.asc

- name: Add Trivy repository
  copy:
    dest: /etc/apt/sources.list.d/trivy.list
    content: "deb [signed-by=/usr/share/keyrings/trivy-keyring.asc] https://aquasecurity.github.io/trivy-repo/deb generic main\n"
    mode: '0644'

- name: Update apt after Trivy repo
  apt:
    update_cache: yes

- name: Install Trivy
  apt:
    name: trivy
    state: present

# ── YQ ────────────────────────────────────────────────────
- name: Install yq
  get_url:
    url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    dest: /usr/local/bin/yq
    mode: '0755'
    force: yes

# ── GIT ───────────────────────────────────────────────────
- name: Install Git
  apt:
    name: git
    state: present
