---
# ── JAVA ──────────────────────────────────────────────────
- name: Install Java 17 and fontconfig
  apt:
    name:
      - openjdk-17-jdk
      - fontconfig
    state: present
    update_cache: yes

# ── JENKINS ───────────────────────────────────────────────
- name: Remove all old Jenkins files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/jenkins.list
    - /etc/apt/keyrings/jenkins-keyring.asc
    - /usr/share/keyrings/jenkins-keyring.asc
    - /usr/share/keyrings/jenkins-keyring.gpg
    - /etc/apt/trusted.gpg.d/jenkins.gpg

- name: Remove Jenkins from sources.list
  lineinfile:
    path: /etc/apt/sources.list
    regexp: ".*pkg.jenkins.io.*"
    state: absent

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Official 2026 key - jenkins.io-2026.key (not 2023!)
- name: Download Jenkins GPG key (2026 official key)
  shell: |
    wget -O /etc/apt/keyrings/jenkins-keyring.asc \
    https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
  args:
    executable: /bin/bash

- name: Add Jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/\n"
    mode: '0644'

- name: Update apt cache after Jenkins repo
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Start and enable Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

- name: Add jenkins to docker group
  user:
    name: jenkins
    groups: docker
    append: yes

- name: Restart Jenkins after docker group change
  service:
    name: jenkins
    state: restarted

- name: Add jenkins to sudoers
  lineinfile:
    path: /etc/sudoers
    line: "jenkins ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s

- name: Wait for Jenkins on port {{ jenkins_port }}
  wait_for:
    host: "0.0.0.0"
    port: "{{ jenkins_port }}"
    delay: 15
    timeout: 90
    state: started

- name: Get Jenkins initial admin password
  command: cat {{ jenkins_home }}/secrets/initialAdminPassword
  register: jenkins_password
  changed_when: false
  retries: 5
  delay: 10
  until: jenkins_password.rc == 0

- name: Print Jenkins access info
  debug:
    msg:
      - "=================================================="
      - " Jenkins is UP!"
      - " URL      : http://{{ jenkins_ec2_public_ip }}:{{ jenkins_port }}"
      - " Password : {{ jenkins_password.stdout }}"
      - "=================================================="

# ── TRIVY ─────────────────────────────────────────────────
- name: Install Trivy dependencies
  apt:
    name:
      - wget
      - apt-transport-https
      - gnupg
      - curl
    state: present

- name: Remove old Trivy files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/trivy.list
    - /etc/apt/keyrings/trivy-keyring.asc
    - /etc/apt/trusted.gpg.d/trivy.gpg

- name: Download Trivy GPG key
  shell: |
    wget -O /etc/apt/keyrings/trivy-keyring.asc \
    https://aquasecurity.github.io/trivy-repo/deb/public.key
  args:
    executable: /bin/bash

- name: Add Trivy repository
  copy:
    dest: /etc/apt/sources.list.d/trivy.list
    content: "deb [signed-by=/etc/apt/keyrings/trivy-keyring.asc] https://aquasecurity.github.io/trivy-repo/deb generic main\n"
    mode: '0644'

- name: Update apt cache after Trivy repo
  apt:
    update_cache: yes

- name: Install Trivy
  apt:
    name: trivy
    state: present

# ── YQ ────────────────────────────────────────────────────
- name: Install yq
  get_url:
    url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    dest: /usr/local/bin/yq
    mode: '0755'

# ── GIT ───────────────────────────────────────────────────
- name: Install Git
  apt:
    name: git
    state: present
